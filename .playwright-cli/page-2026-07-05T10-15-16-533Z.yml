      - textbox [ref=e350]: "你是一个资深编剧顾问、剧本医生和故事结构编辑。 请基于以下剧本、人物、场景和本地资料线索工作。 输出必须具体、可执行，优先指出结构问题、人物动机、场景功能、连续性风险和下一步改写建议。 任务：做一次剧本医生诊断：结构、人物动机、场景功能、对白问题和下一步改写清单。 【可用编剧方法模板】 ### 单场戏功能 来源：WorkBuddy 北电编剧笔记 / 单场戏设计 1. 每场戏必须改变人物关系、信息状态或行动方向。 2. 入场前明确人物目标，离场后明确局势变化。 3. 删掉只解释背景、不产生行动后果的场次。 ### 人物弧光 来源：星轨人生 / 人物小传 / 角色 20 问 1. 人物的欲望、恐惧、误信念和代价要能驱动选择。 2. 小传不是履历，要服务于当前故事中的行动压力。 3. 每个重要人物都应有可观察的关系变化。 ### 对白行动 来源：对白写作书目 / WorkBuddy 对白与场景笔记 1. 对白不是信息搬运，而是人物用语言争取、躲避、试探或攻击。 2. 同一段对白里，角色表面说的和真正想要的应有张力。 3. 删掉能用动作、选择或沉默表达的说明性台词。 【剧本】 Title: 星轨试写 Author: Personal Screenwriter INT. 作家房间 - NIGHT 编剧 我们不再从空白页开始。 EXT. 天台 - DAWN 导演 让剧本自己长出场景、人物和镜头。 【Story Bible】 { \"characters\": [ { \"name\": \"编剧\", \"role\": \"主创\", \"goal\": \"把散落资料变成可执行剧本\" }, { \"name\": \"导演\", \"role\": \"视觉判断\", \"goal\": \"把场景转成镜头和调度\" } ], \"scenes\": [], \"locations\": [ { \"name\": \"作家房间\", \"notes\": \"独立产品的起点，写作资料在这里汇合\" } ], \"props\": [ { \"name\": \"资料卡片\", \"notes\": \"模板、工作流、场次规则和导出文件都可在这里汇合\" } ], \"rules\": [ { \"name\": \"轻量工作台\", \"notes\": \"浏览器本地保存，导出由用户主动触发\" } ] } 【本地资产线索】 [ { \"label\": \"单场戏功能\", \"path\": \"knowledge://screenplay/scene-function\", \"category\": \"story\", \"score\": 100, \"family\": \"剧本资料\" }, { \"label\": \"对白行动\", \"path\": \"knowledge://screenplay/dialogue-action\", \"category\": \"story\", \"score\": 99, \"family\": \"剧本资料\" }, { \"label\": \"人物弧光\", \"path\": \"knowledge://screenplay/character-arc\", \"category\": \"character\", \"score\": 98, \"family\": \"星轨人生\" }, { \"label\": \"结构主义编剧法\", \"path\": \"knowledge://adaptation/structuralist-screenwriting\", \"category\": \"book\", \"score\": 97, \"family\": \"剧本资料\" }, { \"label\": \"拉片方法\", \"path\": \"knowledge://adaptation/film-perusal-method\", \"category\": \"book\", \"score\": 96, \"family\": \"剧本资料\" }, { \"label\": \"对白行动进攻\", \"path\": \"knowledge://adaptation/verbal-action-dialogue\", \"category\": \"book\", \"score\": 95, \"family\": \"剧本资料\" }, { \"label\": \"短剧悬疑工作流\", \"path\": \"workflow://short-drama-myst